name: Deploy Denton Theme to Kinsta

on:
  push:
    branches:
      - main
    paths:
      - 'denton-pharmacy-theme/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Denton to Kinsta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy theme files to Kinsta
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DENTON_KINSTA_SSH_HOST }}
          username: ${{ secrets.DENTON_KINSTA_SSH_USER }}
          password: ${{ secrets.DENTON_KINSTA_SSH_PASSWORD }}
          port: ${{ secrets.DENTON_KINSTA_SSH_PORT }}
          source: "denton-pharmacy-theme/"
          target: "~/public/wp-content/themes/"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DENTON_KINSTA_SSH_HOST }}
          username: ${{ secrets.DENTON_KINSTA_SSH_USER }}
          password: ${{ secrets.DENTON_KINSTA_SSH_PASSWORD }}
          port: ${{ secrets.DENTON_KINSTA_SSH_PORT }}
          script: |
            echo "=== Resolved theme path ==="
            cd ~/public/wp-content/themes/denton-pharmacy-theme && pwd -P
            echo ""
            echo "=== Legal templates present in deployed theme? ==="
            ls -la page-templates/ | grep -iE 'privacy|cookie|terms' || echo "!!! NO LEGAL TEMPLATES FOUND"
            echo ""
            echo "=== style.css mtime (was this folder just written?) ==="
            ls -la style.css
            echo ""
            echo "=== Which environment/site is this? (URL tells us live vs staging) ==="
            cd ~/public
            (wp option get home 2>/dev/null && wp option get siteurl 2>/dev/null) || echo "wp-cli not on PATH"
            echo "hostname: $(hostname)"
            echo "Deploy complete!"
